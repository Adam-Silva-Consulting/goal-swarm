<?xml version="1.0" encoding="UTF-8"?>
<!-- ASC-derived activity bar icon for goal-swarm.
     Single-color: uses currentColor so VS Code can theme it per the active
     color theme (white in dark mode, dark in light mode). Inspired by ASC's
     4-quadrant arrow + circuit-trace favicon. -->
<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
  <!-- Quadrant divider lines (subtle, the "framing" element) -->
  <line x1="12" y1="3" x2="12" y2="6.5" opacity="0.4"/>
  <line x1="12" y1="17.5" x2="12" y2="21" opacity="0.4"/>
  <line x1="3" y1="12" x2="6.5" y2="12" opacity="0.4"/>
  <line x1="17.5" y1="12" x2="21" y2="12" opacity="0.4"/>

  <!-- Central upward-rising arrow (the dominant ASC mark) -->
  <path d="M 7 17 L 12 11 L 17 17" />
  <line x1="12" y1="11" x2="12" y2="21" />

  <!-- Circuit-trace nodes in the 4 corners (the "agentic mesh" feel) -->
  <circle cx="5" cy="5" r="1.2" />
  <circle cx="19" cy="5" r="1.2" />
  <circle cx="5" cy="19" r="1.2" />
  <circle cx="19" cy="19" r="1.2" />

  <!-- Connecting trace lines from corners toward arrow -->
  <path d="M 6 6 L 9 9" opacity="0.6" />
  <path d="M 18 6 L 15 9" opacity="0.6" />
</svg>
